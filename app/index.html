<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>SME - Moduly</title>
    <link rel="icon" type="image/png" href="../assets/sme-mark.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="launcher-shell is-loading" id="launcher-root">
      <section class="launcher-hero">
        <div class="launcher-hero__brand">
          <img
            class="launcher-hero__logo"
            src="../assets/sme-mark.svg"
            alt="Logo SME"
            width="92"
            height="92"
          />
          <div>
            <p class="launcher-eyebrow">Mini Apps Workspace</p>
            <h1>Wybierz modul</h1>
            <p class="launcher-subtitle">
              SME jest osobnym modulem, a launcher pokazuje tez pozycje z rejestru GitHub.
            </p>
          </div>
        </div>
        <p class="launcher-note">
          Mozesz otwierac wbudowane moduly, instalowac nowe z rejestru i aktualizowac juz dograne.
        </p>
      </section>

      <section class="launcher-grid" id="launcher-tiles" aria-live="polite"></section>

      <footer class="launcher-footer">
        <span id="launcher-status">Wczytywanie listy modulow.</span>
      </footer>
    </main>

    <script type="module" src="./launcher.js"></script>
  </body>
</html>
