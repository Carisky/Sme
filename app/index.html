<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>SME - Moduly</title>
    <link rel="icon" type="image/png" href="../assets/sme-mark.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="launcher-shell is-loading" id="launcher-root">
      <section class="launcher-hero">
        <div class="launcher-hero__brand">
          <img
            class="launcher-hero__logo"
            src="../assets/sme-mark.svg"
            alt="Logo SME"
            width="92"
            height="92"
          />
          <div>
            <p class="launcher-eyebrow">Launcher SME</p>
            <h1>Moduly</h1>
            <p class="launcher-subtitle">SME jest gotowy od razu. Pozostale moduly pobierzesz z rejestru.</p>
          </div>
        </div>
        <p class="launcher-note">
          Kafelki pokazuja, co jest wbudowane, zainstalowane albo gotowe do pobrania.
        </p>
      </section>

      <section class="launcher-update" id="launcher-update" aria-live="polite">
        <div class="launcher-update__line">
          <span class="launcher-update__label">Aplikacja</span>
          <strong class="launcher-update__message" id="launcher-update-message">
            Sprawdzanie wersji aplikacji.
          </strong>
          <span class="launcher-update__versions" id="launcher-update-versions" hidden></span>
          <span class="launcher-update__detail" id="launcher-update-detail" hidden></span>
        </div>
        <div class="launcher-update__actions">
          <button
            class="launcher-button launcher-button--primary"
            type="button"
            id="launcher-update-install"
            hidden
          >
            Zaktualizuj aplikacje
          </button>
          <button
            class="launcher-button launcher-button--secondary"
            type="button"
            id="launcher-update-retry"
          >
            Sprawdz ponownie
          </button>
        </div>
      </section>

      <section class="launcher-grid" id="launcher-tiles" aria-live="polite"></section>

      <footer class="launcher-footer">
        <span id="launcher-status">Wczytywanie listy modulow.</span>
      </footer>
    </main>

    <script type="module" src="./launcher.js"></script>
  </body>
</html>
