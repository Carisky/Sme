<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">SilesDoc</title>
  <desc id="desc">Launcher icon for SilesDoc with a reviewed document mark.</desc>
  <defs>
    <linearGradient id="sd-bg" x1="14" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7edda" />
      <stop offset="0.58" stop-color="#ead4b1" />
      <stop offset="1" stop-color="#cfb18b" />
    </linearGradient>
    <linearGradient id="sd-paper" x1="33" y1="23" x2="94" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffaf1" />
      <stop offset="1" stop-color="#edd9bb" />
    </linearGradient>
    <linearGradient id="sd-fold" x1="68" y1="23" x2="88" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8e8cd" />
      <stop offset="1" stop-color="#dcc4a2" />
    </linearGradient>
    <linearGradient id="sd-accent" x1="37" y1="34" x2="87" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4a242" />
      <stop offset="0.58" stop-color="#d1721e" />
      <stop offset="1" stop-color="#9c4a1a" />
    </linearGradient>
    <filter id="sd-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#5a3915" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="128" height="128" rx="30" fill="url(#sd-bg)" />
  <circle cx="29" cy="28" r="18" fill="#fff8ee" opacity="0.34" />
  <circle cx="104" cy="100" r="20" fill="#e4c499" opacity="0.24" />

  <g filter="url(#sd-shadow)">
    <path
      d="M34 22h32l21 21v50c0 7.18-5.82 13-13 13H34c-7.18 0-13-5.82-13-13V35c0-7.18 5.82-13 13-13Z"
      fill="url(#sd-paper)"
    />
    <path d="M66 22v16c0 4.42 3.58 8 8 8h13" fill="url(#sd-fold)" />
  </g>

  <path
    d="M74 43
