<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SilesDoc mark</title>
  <desc id="desc">Document mark for SilesDoc with a warm sand background and an orange review ribbon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7ecd9" />
      <stop offset="1" stop-color="#d6bc97" />
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ec" />
      <stop offset="1" stop-color="#f0dcc0" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f39831" />
      <stop offset="1" stop-color="#9d4f1b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#4e3115" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="108" fill="url(#bg)" />

