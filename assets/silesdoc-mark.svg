    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path d="M47 80 54 87 80 61" fill="none" stroke="#3b2412" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M40 95h30" fill="none" stroke="#d5bb98" stroke-width="4.5" stroke-linecap="round" />
  <path d="M40 103h24" fill="none" stroke="#ddc6a6" stroke-width="4.5" stroke-linecap="round" />
