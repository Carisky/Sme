<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">WCT CEN</title>
  <desc id="desc">Container lookup icon for WCT CEN with a structured customs register card.</desc>
  <defs>
    <linearGradient id="wc-bg" x1="16" y1="14" x2="108" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#133531" />
      <stop offset="0.56" stop-color="#1e5a53" />
      <stop offset="1" stop-color="#2d7b70" />
    </linearGradient>
    <linearGradient id="wc-card" x1="24" y1="30" x2="86" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffaf1" />
      <stop offset="1" stop-color="#eadfc9" />
    </linearGradient>
    <linearGradient id="wc-chip" x1="70" y1="70" x2="104" y2="103" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0a459" />
      <stop offset="0.58" stop-color="#d57a20" />
      <stop offset="1" stop-color="#9d4d1c" />
    </linearGradient>
    <filter id="wc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0b211f" flood-opacity="0.24" />
    </filter>
  </defs>

  <rect width="128" height="128" rx="30" fill="url(#wc-bg)" />
