    <path d="M36 42h34" stroke="#1c5750" stroke-width="6.5" stroke-linecap="round" />
    <path d="M36 54h34" stroke="#1c5750" stroke-width="6.5" stroke-linecap="round" opacity="0.78" />
    <path d="M36 66h18" stroke="#d07a2f" stroke-width="6.5" stroke-linecap="round" />
    <path d="M49 36v42" stroke="#d9ccb6" stroke-width="2.4" opacity="0.82" />
