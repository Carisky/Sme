<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Place Holder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="placeholder-shell">
      <section class="placeholder-card">
        <p class="placeholder-eyebrow">GitHub Registry Mini App</p>
        <h1>Place Holder</h1>
        <p class="placeholder-copy">
          To jest testowy modul instalowany z rejestru. Ma tylko prosty widok i lokalne zasoby.
        </p>
        <div class="placeholder-grid">
          <article>
            <strong>Status</strong>
            <span>Modul uruchomiony poprawnie</span>
          </article>
          <article>
            <strong>Zrodlo</strong>
            <span>module_registry/apps/placeholder</span>
          </article>
        </div>
        <div class="placeholder-actions">
          <button type="button" class="placeholder-button" id="placeholder-back-button">
            Wroc do listy modulow
          </button>
        </div>
      </section>
    </main>

    <script>
      const backButton = document.getElementById("placeholder-back-button");
      backButton?.addEventListener("click", async () => {
        try {
          if (window.bridge?.openHome) {
            await window.bridge.openHome();
            return;
          }
        } catch (error) {
          console.error(error);
        }

        window.history.back();
      });
    </script>
  </body>
</html>
